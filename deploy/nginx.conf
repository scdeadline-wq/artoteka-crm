upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name artoteka.ru api.artoteka.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API
server {
    listen 443 ssl;
    server_name api.artoteka.ru;

    ssl_certificate /etc/letsencrypt/live/artoteka.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artoteka.ru/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Frontend
server {
    listen 443 ssl;
    server_name artoteka.ru;

    ssl_certificate /etc/letsencrypt/live/artoteka.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/artoteka.ru/privkey.pem;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
